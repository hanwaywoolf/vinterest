document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rofile that's uniquely yours — so you always know what to order, what to buy, and what to say.<\u002Fp>\n      <div class=\"hero-actions reveal reveal-delay-3\">\n        <a href=\"https://vinterest.pages.dev\" target=\"_blank\" class=\"btn-primary\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M10 3v10M6 9l4 4 4-4\" stroke=\"#fff\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M4 16h12\" stroke=\"#fff\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          Download free\n        <\u002Fa>\n        <a href=\"https://vinterest.pages.dev\" target=\"_blank\" class=\"btn-ghost\">Open in browser →<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"hero-stats reveal reveal-delay-3\">\n        <div>\n          <div class=\"hero-stat-val\">Free<\u002Fdiv>\n          <div class=\"hero-stat-label\">to get started<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"hero-stat-val\">AI<\u002Fdiv>\n          <div class=\"hero-stat-label\">personalised for you<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"hero-stat-val\">WineDNA<\u002Fdiv>\n          <div class=\"hero-stat-label\">built around your taste<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Hero phone: Scan UI -->\n    <div class=\"phone-wrap reveal reveal-delay-2\">\n      <div class=\"phone\">\n        <div class=\"phone-notch\"><\u002Fdiv>\n        <div class=\"phone-screen\">\n          <div class=\"scan-header\">\n            <span class=\"scan-logo\">Vinterest<\u002Fspan>\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 20 20\" fill=\"none\"><rect x=\"3\" y=\"3\" width=\"6\" height=\"6\" rx=\"1\" stroke=\"#0C0608\" stroke-width=\"1.5\" fill=\"none\"><\u002Frect><rect x=\"11\" y=\"3\" width=\"6\" height=\"6\" rx=\"1\" stroke=\"#0C0608\" stroke-width=\"1.5\" fill=\"none\"><\u002Frect><rect x=\"3\" y=\"11\" width=\"6\" 2Fdiv><\u002Fdiv>\n              <div style=\"flex:1;text-align:center\"><div style=\"font-family:'Poppins',sans-serif;font-size:9px;font-weight:700;color:#8B1A2F\">Dry<\u002Fdiv><div style=\"font-family:'Poppins',sans-serif;font-size:9px;color:#7A6E6B\">Sweetness<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section class=\"how\">\n  <div class=\"max\">\n    <div class=\"section-label reveal\">How it works<\u002Fdiv>\n    <h2 class=\"section-title reveal reveal-delay-1\">Three steps to knowing your wine — and yourself.<\u002Fh2>\n    <div class=\"how-grid\">\n      <div class=\"how-step reveal\">\n        <div class=\"how-num\">01<\u002Fdiv>\n        <div class=\"how-icon\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 20 20\" fill=\"none\"><rect x=\"2.5\" y=\"6\" width=\"15\" height=\"11\" rx=\"2\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\"><\u002Frect><circle cx=\"10\" cy=\"11.5\" r=\"3\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\"><\u002Fcircle><path d=\"M7.5 6L8.5 4h3l1 2\" stroke=\"#fff\" stroke-width=\"1.4\" fill=\"none\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"how-h\">Scan<\u002Fh3>\n        <p class=\"how-p\">Point your camera at any bottle. Vinterest identifies it in seconds — no typing, no searching, no guessing.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"how-step reveal reveal-delay-1\">\n        <div class=\"how-num\">02<\u002Fdiv>\n        <div class=\"how-icon\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M7.5 2.5h5v5c0 3.5-1.8 5-2.5 5S7.5 11 7.5 8V2.5z\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\" stroke-linejoin=\"round\"><\u002Fpath><line x1=\"10\" y1=\"12.5\" x2=\"10\" y2=\"17\" stroke=\"#fff\" stroke-width=\"1.5\"><\u002Fline><line x1=\"7\" y1=\"17\" x2=\"13\" y2=\"17\" stroke=\"#fff\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"how-h\">Discover<\u002Fh3>\n        <p class=\"how-p\">Tasting notes, food pairings, vintage quality, and real retail prices — every detail explained in plain language, matched to your taste.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"how-step reveal reveal-delay-2\">\n        <div class=\"how-num\">03<\u002Fdiv>\n        <div class=\"how-icon\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M10 15V7.5\" stroke=\"#fff\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-dasharray=\"1.2 1.8\" opacity=\".4\"><\u002Fpath><path d=\"M10 7.5C10 5.5 8.5 4 7 4C5.3 4 4 5.2 4 6.8C3.1 7.1 2.4 8 2.4 9.2C2.4 10.4 3.2 11.4 4.3 11.7C4.1 12.2 4 12.7 4 13.3C4 14.9 5.3 16.1 7 16.2L10 16.3\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M10 7.5C10 5.5 11.5 4 13 4C14.7 4 16 5.2 16 6.8C16.9 7.1 17.6 8 17.6 9.2C17.6 10.4 16.8 11.4 15.7 11.7C15.9 12.2 16 12.7 16 13.3C16 14.9 14.7 16.1 13 16.2L10 16.3\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"how-h\">Grow<\u002Fh3>\n        <p class=\"how-p\">Every bottle you scan deepens your WineDNA — a living portrait of your palate that gets sharper, and more uniquely yours, with every pour.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WINE DNA -->\n<section class=\"dna-sect\">\n  <div class=\"dna-grain\"><\u002Fdiv>\n  <div class=\"dna-glow\"><\u002Fdiv>\n  <div class=\"max\">\n    <div class=\"dna-split\">\n      <!-- Phone: DNA screen -->\n      <div class=\"phone-wrap reveal\" style=\"animation:none\">\n        <div class=\"phone\" style=\"animation:none;transform:rotate(-2deg)\">\n          <div class=\"phone-notch\"><\u002Fdiv>\n          <div class=\"phone-screen\">\n            <div class=\"dna-header\">\n              <div class=\"dna-title\">Wine DNA<\u002Fdiv>\n              <div class=\"dna-sub\">Your taste fingerprint<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"dna-body\">\n              <div class=\"dna-type\">\n                <div class=\"dna-chip\" style=\"background:#8B1A2F;color:#fff\">Reds<\u002Fdiv>\n                <div class=\"dna-chip\" style=\"background:#F8F4F0;color:#7A6E6B\">Whites<\u002Fdiv>\n                <div class=\"dna-chip\" style=\"background:#F8F4F0;color:#7A6E6B\">Rosé<\u002Fdiv>\n                <div class=\"dna-chip\" style=\"background:#F8F4F0;color:#7A6E6B\">Sparkling<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <div class=\"dna-bar-row\"><div class=\"dna-bar-label\"><span>Body<\u002Fspan><small>Full<\u002Fsmall><\u002Fdiv><div class=\"dna-track\"><div class=\"dna-fill\" style=\"width:85%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <div class=\"dna-bar-row\"><div class=\"dna-bar-label\"><span>Tannins<\u002Fspan><small>Grippy<\u002Fsmall><\u002Fdiv><div class=\"dna-track\"><div class=\"dna-fill\" style=\"width:72%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <div class=\"dna-bar-row\"><div class=\"dna-bar-label\"><span>Acidity<\u002Fspan><small>Medium<\u002Fsmall><\u002Fdiv><div class=\"dna-track\"><div class=\"dna-fill\" style=\"width:55%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <div class=\"dna-bar-row\"><div class=\"dna-bar-label\"><span>Sweetness<\u002Fspan><small>Dry<\u002Fsmall><\u002Fdiv><div class=\"dna-track\"><div class=\"dna-fill\" style=\"width:12%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"dna-script\">\n                <p style=\"font-family:'Poppins',sans-serif;font-size:8px;font-weight:700;color:#8B1A2F;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px\">Your Red Script<\u002Fp>\n                <p>\"I love full-bodied reds with structure — Châteauneuf-du-Pape, Barolo, and aged Rioja are my touchstones.\"<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Copy -->\n      <div class=\"dna-copy reveal reveal-delay-1\">\n        <div class=\"dna-label\">WineDNA<\u002Fdiv>\n        <h2 class=\"dna-headline\">Your taste, finally understood.<\u002Fh2>\n        <p class=\"dna-body\">Most people drink what they know because they don't know what they like. WineDNA changes that. Every bottle you scan adds another layer to a portrait of your palate — your favourite regions, your go-to grapes, your body preferences, your flavour signatures — built entirely around you.<\u002Fp>\n        <div class=\"dna-features\">\n          <div class=\"dna-feat\"><div class=\"dna-feat-dot\"><\u002Fdiv><p><strong>It goes deep<\u002Fstrong> — Not just what you like, but why. WineDNA explains your taste in plain language — so you understand yourself as a wine drinker, not just what's in your glass.<\u002Fp><\u002Fdiv>\n          <div class=\"dna-feat\"><div class=\"dna-feat-dot\"><\u002Fdiv><p><strong>It evolves with you<\u002Fstrong> — Your palate isn't static and neither is your WineDNA. Scan more, explore more, and watch your taste profile sharpen with every pour.<\u002Fp><\u002Fdiv>\n          <div class=\"dna-feat\"><div class=\"dna-feat-dot\"><\u002Fdiv><p><strong>It covers everything<\u002Fstrong> — Separate profiles for reds, whites, rosé, and sparkling — because your taste in a Burgundy and your taste in a Blanc de Blancs are two very different conversations.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SOMMELIER SCRIPT -->\n<section class=\"script-sect\">\n  <div class=\"max\">\n    <div class=\"script-split\">\n      <div class=\"script-copy reveal\">\n        <div class=\"section-label\">Sommelier Script<\u002Fdiv>\n        <h2 class=\"section-title\">Always know what to say.<\u002Fh2>\n        <p class=\"how-p\" style=\"margin-top:0\">Most people freeze when a sommelier asks what they like. Or they point at a price point and hope for the best. Your Sommelier Script changes that — a personalised, WineDNA-powered description of your taste, in your own words, ready whenever you need it.<\u002Fp>\n        <p class=\"how-p\" style=\"margin-top:16px\">Short enough to say at the table. Long enough to impress at the cellar door. Separate scripts for reds, whites, rosé, and sparkling — so whatever you're ordering, you sound exactly like someone who knows their wine.<\u002Fp>\n        <p class=\"how-p\" style=\"margin-top:8px;font-style:italic\">Because you do.<\u002Fp>\n      <\u002Fdiv>\n      <!-- Phone: Script screen -->\n      <div class=\"phone-wrap reveal reveal-delay-1\">\n        <div class=\"phone\" style=\"animation:none;transform:rotate(1.5deg)\">\n          <div class=\"phone-notch\"><\u002Fdiv>\n          <div class=\"phone-screen\">\n            <div class=\"scan-header\"><span class=\"scan-logo\">Home<\u002Fspan><\u002Fdiv>\n            <div style=\"padding:10px;display:flex;flex-direction:column;gap:8px;flex:1;overflow:hidden\">\n              <div style=\"display:flex;gap:0;background:#F8F4F0;border-radius:8px;padding:2px\">\n                <div style=\"flex:1;text-align:center;padding:5px;border-radius:6px;background:#8B1A2F\"><span style=\"font-family:'Poppins',sans-serif;font-size:9px;font-weight:600;color:#fff\">Reds<\u002Fspan><\u002Fdiv>\n                <div style=\"flex:1;text-align:center;padding:5px\"><span style=\"font-family:'Poppins',sans-serif;font-size:9px;font-weight:600;color:#7A6E6B\">Whites<\u002Fspan><\u002Fdiv>\n                <div style=\"flex:1;text-align:center;padding:5px\"><span style=\"font-family:'Poppins',sans-serif;font-size:9px;font-weight:600;color:#7A6E6B\">Rosé<\u002Fspan><\u002Fdiv>\n                <div style=\"flex:1;text-align:center;padding:5px\"><span style=\"font-family:'Poppins',sans-serif;font-size:8px;font-weight:600;color:#7A6E6B\">Sparkling<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:rgba(139,26,47,.06);border:1.5px solid rgba(139,26,47,.15);border-radius:12px;padding:10px 12px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px\">\n                  <div style=\"display:flex;align-items:center;gap:6px\">\n                    <svg width=\"12\" height=\"12\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M3 5h14a1 1 0 011 1v8a1 1 0 01-1 1H5l-3 2V6a1 1 0 011-1z\" stroke=\"#8B1A2F\" stroke-width=\"1.5\" fill=\"none\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                    <span style=\"font-family:'Poppins',sans-serif;font-size:9px;font-weight:700;color:#0C0608\">Your Red Script<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:2px;background:#F8F4F0;border-radius:4px;padding:2px\">\n                    <div style=\"padding:2px 5px;border-radius:3px;background:#8B1A2F\"><span style=\"font-family:'Poppins',sans-serif;font-size:8px;font-weight:600;color:#fff\">Short<\u002Fspan><\u002Fdiv>\n                    <div style=\"padding:2px 5px;border-radius:3px\"><span style=\"font-family:'Poppins',sans-serif;font-size:8px;font-weight:600;color:#7A6E6B\">Long<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <p style=\"font-family:'Poppins',sans-serif;font-size:9px;color:#4A3E3E;line-height:1.6;font-style:italic\">\"Full-bodied Grenache-forward reds from southern Rhône — my benchmarks are Châteauneuf and aged Rioja.\"<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border-radius:12px;border:1px solid #F0EDED;padding:8px 12px\">\n                <div style=\"font-family:'Poppins',sans-serif;font-size:9px;color:#7A6E6B;font-weight:500;margin-bottom:6px\">Recently scanned<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:5px\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"font-family:'Poppins',sans-serif;font-size:9px;font-weight:600;color:#0C0608\">Châteauneuf-du-Pape Jean XXII<\u002Fspan><span style=\"font-family:'Poppins',sans-serif;font-size:9px;font-weight:700;color:#8B1A2F\">80<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"font-family:'Poppins',sans-serif;font-size:9px;font-weight:600;color:#0C0608\">Banda Azul Rioja 1985<\u002Fspan><span style=\"font-family:'Poppins',sans-serif;font-size:9px;font-weight:700;color:#8B1A2F\">95<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FEATURES -->\n<section class=\"feat-sect\">\n  <div class=\"max\">\n    <div class=\"section-label reveal\">Features<\u002Fdiv>\n    <h2 class=\"section-title reveal reveal-delay-1\">Built for the <em>curious drinker.<\u002Fem><\u002Fh2>\n    <div class=\"feat-grid reveal reveal-delay-1\">\n      <div class=\"feat-card\">\n        <div class=\"feat-icon\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M10 16.5C10 16.5 3 12 3 7.5C3 5 5 3.2 7.2 3.2c1.5 0 2.5 1 2.8 1.8.3-.8 1.3-1.8 2.8-1.8C15 3.2 17 5 17 7.5c0 4.5-7 9-7 9z\" stroke=\"#fff\" stroke-width=\"1.6\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"feat-h\">Match Score<\u002Fh3>\n        <p class=\"feat-p\">Every wine scored against your actual WineDNA — not generic critic ratings. Know before you buy whether it's really your style.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat-card\">\n        <div class=\"feat-icon\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M4 5h12M4 9h12M4 13h7\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><circle cx=\"15\" cy=\"14.5\" r=\"2.8\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\"><\u002Fcircle><path d=\"M16.8 16.3l1.8 1.8\" stroke=\"#fff\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"feat-h\">Scan the wine list<\u002Fh3>\n        <p class=\"feat-p\">At a restaurant and not sure where to start? Scan the wine list and Vinterest highlights the bottles that match your WineDNA — so you order with confidence, every time.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat-card\">\n        <div class=\"feat-icon\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M7 2v5c0 1.5.8 2.5 2 3v8\" stroke=\"#fff\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M5 2v3M9 2v3\" stroke=\"#fff\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M14 2v4l2-1v-3\" stroke=\"#fff\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M14 6c0 2.5 2 3 2 5v7\" stroke=\"#fff\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"feat-h\">Food Pairings<\u002Fh3>\n        <p class=\"feat-p\">Intelligent pairing suggestions matched to the wine's profile — so every meal becomes a better experience.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat-card\">\n        <div class=\"feat-icon\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><circle cx=\"10\" cy=\"10\" r=\"7.5\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\"><\u002Fcircle><ellipse cx=\"10\" cy=\"10\" rx=\"3.5\" ry=\"7.5\" stroke=\"#fff\" stroke-width=\"1.2\" fill=\"none\"><\u002Fellipse><line x1=\"2.5\" y1=\"10\" x2=\"17.5\" y2=\"10\" stroke=\"#fff\" stroke-width=\"1.2\"><\u002Fline><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"feat-h\">Vintage Data<\u002Fh3>\n        <p class=\"feat-p\">Quality ratings, drinking windows, and peak years for every vintage — so you always know when to open it.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat-card\">\n        <div class=\"feat-icon\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M2 3h2.5l2.2 10h8.6l1.8-7H6.5\" stroke=\"#fff\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"9\" cy=\"17\" r=\"1.2\" fill=\"#fff\"><\u002Fcircle><circle cx=\"14.5\" cy=\"17\" r=\"1.2\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"feat-h\">Where to Buy<\u002Fh3>\n        <p class=\"feat-p\">Real prices and local stockists based on where you are — so you never overpay for a bottle you could find cheaper down the road.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat-card\">\n        <div class=\"feat-icon\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M4 4.5C4 4.5 7 3.5 10 5C13 3.5 16 4.5 16 4.5V15C16 15 13 14 10 15.5C7 14 4 15 4 15V4.5Z\" stroke=\"#fff\" stroke-width=\"1.6\" fill=\"none\" stroke-linejoin=\"round\"><\u002Fpath><line x1=\"10\" y1=\"5\" x2=\"10\" y2=\"15.5\" stroke=\"#fff\" stroke-width=\"1.2\"><\u002Fline><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"feat-h\">Wine Stories<\u002Fh3>\n        <p class=\"feat-p\">The winemaker's story, the grape's history, the region's character — beautifully written for every bottle you scan.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat-card\">\n        <div class=\"feat-icon\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M5.5 3h9v5c0 3-2 5-4.5 5S5.5 11 5.5 8V3z\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\"><\u002Fpath><line x1=\"10\" y1=\"13\" x2=\"10\" y2=\"16.5\" stroke=\"#fff\" stroke-width=\"1.5\"><\u002Fline><line x1=\"7\" y1=\"16.5\" x2=\"13\" y2=\"16.5\" stroke=\"#fff\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n        <\u002Fdiv>\n        <h3 class=\"feat-h\">XP &amp; Progress<\u002Fh3>\n        <p class=\"feat-p\">Earn points for scanning, rating, and learning. Watch your wine knowledge grow with every bottle.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LEARNING HUB -->\n<section class=\"learn-sect\">\n  <div class=\"max\">\n    <div class=\"learn-split\">\n      <div class=\"reveal\">\n        <div class=\"section-label\">Learn<\u002Fdiv>\n        <h2 class=\"section-title\">Every sip makes you <em>sharper.<\u002Fem><\u002Fh2>\n        <p class=\"how-p\" style=\"margin-top:20px\">Vinterest learns as you drink — and so do you. AI-personalised articles, wine quizzes, and tasting deep-dives, all tailored to your WineDNA and knowledge level. The more you explore, the more you earn. The more you earn, the more you unlock.<\u002Fp>\n        <p class=\"how-p\" style=\"margin-top:16px\">Start as a Novice. Work your way through Explorer, Connoisseur, Sommelier, and beyond. Every scan, every quiz, every rating earns you XP — and every XP brings you closer to Grand Master.<\u002Fp>\n        <p class=\"how-p\" style=\"margin-top:16px\">Wine knowledge shouldn't feel like homework. With Vinterest, it feels like the next glass.<\u002Fp>\n        <a href=\"https://vinterest.pages.dev\" target=\"_blank\" class=\"btn-primary\" style=\"margin-top:28px;display:inline-flex\">Start learning →<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"learn-cards reveal reveal-delay-1\">\n        <div class=\"learn-card\">\n          <div class=\"learn-card-icon\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M4 4.5C4 4.5 7 3.5 10 5C13 3.5 16 4.5 16 4.5V15C16 15 13 14 10 15.5C7 14 4 15 4 15V4.5Z\" stroke=\"#fff\" stroke-width=\"1.6\" fill=\"none\" stroke-linejoin=\"round\"><\u002Fpath><line x1=\"10\" y1=\"5\" x2=\"10\" y2=\"15.5\" stroke=\"#fff\" stroke-width=\"1.2\"><\u002Fline><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div class=\"learn-card-h\">5 taste terms every wine drinker should know<\u002Fdiv>\n            <div class=\"learn-card-p\">Body, tannins, acidity, finish — explained simply<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"learn-xp\" style=\"margin-left:auto;flex-shrink:0\">+25 XP<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"learn-card\">\n          <div class=\"learn-card-icon\" style=\"background:#C4A45A\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M5.5 3h9v5c0 3-2 5-4.5 5S5.5 11 5.5 8V3z\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\"><\u002Fpath><line x1=\"10\" y1=\"13\" x2=\"10\" y2=\"16.5\" stroke=\"#fff\" stroke-width=\"1.5\"><\u002Fline><line x1=\"7\" y1=\"16.5\" x2=\"13\" y2=\"16.5\" stroke=\"#fff\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div class=\"learn-card-h\">Regions quiz — Beginner<\u002Fdiv>\n            <div class=\"learn-card-p\">France, Italy, Spain — can you name the wines?<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"learn-xp\" style=\"margin-left:auto;flex-shrink:0\">+50 XP<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"learn-card\" style=\"opacity:.6\">\n          <div class=\"learn-card-icon\" style=\"background:#C4394F\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M7.5 2.5h5v5c0 3.5-1.8 5-2.5 5S7.5 11 7.5 8V2.5z\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\" stroke-linejoin=\"round\"><\u002Fpath><line x1=\"10\" y1=\"12.5\" x2=\"10\" y2=\"17\" stroke=\"#fff\" stroke-width=\"1.5\"><\u002Fline><line x1=\"7\" y1=\"17\" x2=\"13\" y2=\"17\" stroke=\"#fff\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div class=\"learn-card-h\">Your personalised reading list<\u002Fdiv>\n            <div class=\"learn-card-p\">AI-curated articles based on your wine history<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"learn-xp\" style=\"margin-left:auto;flex-shrink:0;color:var(--mid)\">Unlocks →<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA -->\n<section class=\"cta-sect\">\n  <div class=\"cta-grain\"><\u002Fdiv>\n  <div class=\"max\">\n    <div class=\"cta-inner\">\n      <h2 class=\"cta-headline reveal\">Every great wine has a story. Now so do you.<\u002Fh2>\n      <p class=\"cta-sub reveal reveal-delay-1\">You don't need to be an expert to drink like one. You just need Vinterest. Scan your first bottle, start building your WineDNA, and gain a little con<em style=\"font-style:italic\">vin<\u002Fem>dence with every sip.<\u002Fp>\n      <div class=\"cta-actions reveal reveal-delay-2\">\n        <a href=\"https://vinterest.pages.dev\" target=\"_blank\" class=\"btn-white\">Download free<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div>\n    <div class=\"footer-logo\">Vinterest<\u002Fdiv>\n    <div class=\"footer-tagline\">Know your wine. Every pour.<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;gap:28px;flex-wrap:wrap\">\n    <a href=\"https://vinterest.pages.dev\" target=\"_blank\" class=\"footer-link\">Open App<\u002Fa>\n    <a href=\"https://vinterest.pages.dev\" target=\"_blank\" class=\"footer-link\">Install<\u002Fa>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n// Nav scroll state\nconst nav=document.getElementById('nav');\nwindow.addEventListener('scroll',()=>{nav.classList.toggle('scrolled',window.scrollY>60);},{ passive:true });\n\n// Reveal on scroll\nconst reveals=document.querySelectorAll('.reveal');\nconst io=new IntersectionObserver((entries)=>{\n  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});\n},{threshold:.12});\nreveals.forEach(r=>io.observe(r));\n\n// Trigger hero elements immediately\ndocument.querySelectorAll('.hero .reveal').forEach((el,i)=>{\n  setTimeout(()=>el.classList.add('visible'), i*150+200);\n});\n<\u002Fscript>\n\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
