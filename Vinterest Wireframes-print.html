<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinterest — Wireframes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #E8E4DF; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="wireframe-kit.jsx"></script>
  <script type="text/babel" src="screens-core.jsx"></script>
  <script type="text/babel" src="screens-detail.jsx"></script>
  <script type="text/babel" src="screens-modes.jsx"></script>
  <script type="text/babel" src="screens-growth.jsx"></script>

  <script type="text/babel">
    const W = 320;
    const H = 692;

    function App() {
      return (
        <DesignCanvas>
          {/* ─── HOME SCREEN ─── */}
          <DCSection id="home" title="Home Screen" subtitle="Three approaches to the primary landing experience">
            <DCArtboard id="home-a" label="A · The Scanner — action-first" width={W} height={H}>
              <HomeScanner />
            </DCArtboard>
            <DCArtboard id="home-b" label="B · The Journal — personal diary" width={W} height={H}>
              <HomeJournal />
            </DCArtboard>
            <DCArtboard id="home-c" label="C · The Guide — learning-forward" width={W} height={H}>
              <HomeGuide />
            </DCArtboard>
          </DCSection>

          {/* ─── SCAN FLOW ─── */}
          <DCSection id="scan" title="Scan Flow" subtitle="Camera → Identification → Quick Result">
            <DCArtboard id="scan-camera" label="Camera / Viewfinder" width={W} height={H}>
              <ScanCamera />
            </DCArtboard>
            <DCArtboard id="scan-result" label="Wine Identified — Quick Result" width={W} height={H}>
              <ScanResult />
            </DCArtboard>
          </DCSection>

          {/* ─── WINE DETAIL ─── */}
          <DCSection id="detail" title="Wine Detail" subtitle="Three layouts for presenting wine information after scan">
            <DCArtboard id="detail-a" label="A · The Card — stacked info cards" width={W} height={H}>
              <WineDetailCard />
            </DCArtboard>
            <DCArtboard id="detail-b" label="B · The Story — narrative format" width={W} height={H}>
              <WineDetailStory />
            </DCArtboard>
            <DCArtboard id="detail-c" label="C · The Dashboard — data-forward, tabbed" width={W} height={H}>
              <WineDetailDash />
            </DCArtboard>
          </DCSection>

          {/* ─── TASTE PROFILE ─── */}
          <DCSection id="profile" title="Taste Profile" subtitle="Personal wine DNA and sommelier script">
            <DCArtboard id="taste-profile" label="Taste Profile Overview" width={W} height={H}>
              <TasteProfile />
            </DCArtboard>
          </DCSection>

          {/* ─── RESTAURANT MODE ─── */}
          <DCSection id="restaurant" title="Restaurant Mode" subtitle="Wine list scan → preferences → sommelier script">
            <DCArtboard id="rest-entry" label="Restaurant Mode Entry" width={W} height={H}>
              <RestaurantEntry />
            </DCArtboard>
            <DCArtboard id="rest-setup" label="Budget, Food & Preferences" width={W} height={H}>
              <RestaurantSetup />
            </DCArtboard>
            <DCArtboard id="rest-script" label="Sommelier Script + Picks" width={W} height={H}>
              <RestaurantScript />
            </DCArtboard>
          </DCSection>

          {/* ─── SHOPPING MODE ─── */}
          <DCSection id="shopping" title="Shopping Mode" subtitle="In-store scanning with match scores and history">
            <DCArtboard id="shop-scan" label="Bottle Scan + Match Score" width={W} height={H}>
              <ShoppingScan />
            </DCArtboard>
            <DCArtboard id="shop-history" label="Wine History / Collection" width={W} height={H}>
              <ShoppingHistory />
            </DCArtboard>
          </DCSection>

          {/* ─── EDUCATION ─── */}
          <DCSection id="learn" title="Education & Quizzes" subtitle="Duolingo-style learning with streaks and progression">
            <DCArtboard id="learn-hub" label="Learn Hub — Topics & Progress" width={W} height={H}>
              <LearnHub />
            </DCArtboard>
            <DCArtboard id="quiz-active" label="Quiz — Active Question" width={W} height={H}>
              <QuizActive />
            </DCArtboard>
            <DCArtboard id="quiz-result" label="Quiz Complete — Results" width={W} height={H}>
              <QuizResult />
            </DCArtboard>
          </DCSection>

          {/* ─── SOCIAL & SHARING ─── */}
          <DCSection id="social" title="Social & Sharing" subtitle="Profiles, sharing wines, and friend discovery">
            <DCArtboard id="social-profile" label="Your Profile" width={W} height={H}>
              <SocialProfile />
            </DCArtboard>
            <DCArtboard id="share-wine" label="Share a Wine" width={W} height={H}>
              <ShareWine />
            </DCArtboard>
          </DCSection>

          {/* ─── DISCOVERY ─── */}
          <DCSection id="discover" title="Discovery — Similar Wines" subtitle="Adjacent varietals and pivot recommendations">
            <DCArtboard id="discover-similar" label="If You Like Pinot Grigio..." width={W} height={H}>
              <DiscoverSimilar />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
<script>
(async () => {
  // Prepend so page-supplied @page / break rules (deck-stage's margin:0,
  // author CSS) keep source-order precedence over the baseline.
  const baseCss = document.createElement('style');
  baseCss.textContent = "@media print {\n  @page { margin: 0.5cm; }\n  html, body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }\n  section, article, figure, table { break-inside: avoid; }\n  *, *::before, *::after {\n    animation-delay: -99s !important; animation-duration: .001s !important;\n    animation-iteration-count: 1 !important; animation-fill-mode: both !important;\n    animation-play-state: running !important; transition-duration: 0s !important;\n  }\n}";
  document.head.prepend(baseCss);
  if (document.readyState === 'loading') {
    await new Promise((r) => document.addEventListener('DOMContentLoaded', r, { once: true }));
  }
  let ds = document.querySelector('deck-stage');
  // whenDefined never resolves when nothing registers the element, so only
  // await it when a <deck-stage> tag exists (and race a timeout regardless).
  if (ds && !customElements.get('deck-stage')) {
    try {
      await Promise.race([
        customElements.whenDefined('deck-stage'),
        new Promise((r) => setTimeout(r, 3000)),
      ]);
    } catch (e) {}
    ds = document.querySelector('deck-stage');
  }
  // dc-runtime assigns window.DCLogic at init and mounts into #dc-root on
  // DOMContentLoaded; settle on that subtree so React has rendered before
  // print(). Non-DC pages fall through to weighing body.
  const isDc = !ds && 'DCLogic' in window;
  const settleRoot = ds || (isDc ? document.getElementById('dc-root') : null) || document.body;
  if (settleRoot) {
    // Weigh only content children — skip script/style/template so inline
    // Babel/CSS doesn't register as stable "content" before the framework
    // has mounted anything.
    const MEDIA = 'img,svg,canvas,video,picture,iframe,embed,object';
    const weigh = () => {
      let text = 0, media = 0;
      for (const c of settleRoot.children) {
        const t = c.tagName;
        if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
        text += (c.textContent || '').trim().length;
        media += c.querySelectorAll(MEDIA).length + (c.matches(MEDIA) ? 1 : 0);
      }
      return text + media * 100;
    };
    // "Non-zero and stable" alone is not sufficient to mean rendered: generic
    // body can carry a static shell while async main content is pending, and
    // #dc-root can carry the root DC's static text while child refs are still
    // .sc-placeholder boxes. Gate generic on readyState 'complete', and never
    // accept stability while a dc-runtime placeholder is present.
    const isGeneric = settleRoot === document.body;
    const deadline = Date.now() + 15000;
    let last = -1, stable = 0;
    while (Date.now() < deadline) {
      const n = weigh();
      const ready =
        (!isGeneric || document.readyState === 'complete') &&
        !settleRoot.querySelector('.sc-placeholder');
      if (n > 0 && n === last && ready) { if (++stable >= 2) break; } else { stable = 0; }
      last = n;
      await new Promise((r) => setTimeout(r, 250));
    }
  }
  try { await document.fonts.ready; } catch (e) {}
  // Jump every animation to its end state so print() never captures a slide
  // mid-entrance. Ordering matters: the 0s-transition style must be live
  // BEFORE data-deck-active is set so attribute-keyed transitions don't
  // start a (now-0s) run from the pre-active base.
  const st = document.createElement('style');
  st.textContent = '*,*::before,*::after{animation-delay:-99s !important;animation-duration:.001s !important;animation-iteration-count:1 !important;animation-fill-mode:both !important;animation-play-state:running !important;transition-duration:0s !important}';
  document.head.appendChild(st);
  for (const d of document.querySelectorAll('deck-stage')) {
    for (const c of d.children) {
      const t = c.tagName;
      if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
      c.setAttribute('data-deck-active', '');
    }
  }
  try {
    const sweep = () => {
      for (const a of document.getAnimations()) {
        try { a.finish(); } catch (e) {
          try { a.currentTime = (a.effect && a.effect.getComputedTiming().duration) || 0; a.pause(); } catch (e2) {}
        }
      }
    };
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
</body>
</html>
