[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/claude"
  to = "/.netlify/functions/claude"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Cache-Control = "public, max-age=3600"
