<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vinterest — New User Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;background:#1A1A1D;font-family:'Poppins',sans-serif;overflow:hidden;}
  #root{width:100%;height:100dvh;display:flex;flex-direction:column;}

  .flow-top{flex-shrink:0;display:flex;align-items:center;gap:6px;justify-content:center;flex-wrap:wrap;
    padding:14px 16px;background:#121214;border-bottom:1px solid rgba(255,255,255,0.08);}
  .flow-step{font-size:12.5px;font-weight:600;color:rgba(255,255,255,0.42);font-family:'Poppins',sans-serif;
    padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;}
  .flow-step:hover{color:rgba(255,255,255,0.7);}
  .flow-step.on{background:#8B1A2F;color:#fff;}
  .flow-step .num{opacity:0.5;margin-right:5px;}

  .flow-stage{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;position:relative;}

  .device{width:390px;height:844px;border-radius:46px;background:#0A0A0A;padding:11px;
    box-shadow:0 0 0 2px #2C2C30,0 30px 80px rgba(0,0,0,0.6);flex-shrink:0;}
  .device-screen{width:100%;height:100%;border-radius:36px;overflow:hidden;background:#000;
    display:flex;flex-direction:column;position:relative;}

  .flow-arrows{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:5;}
  .flow-arrow{width:42px;height:42px;border-radius:21px;background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.12);}
  .flow-arrow:hover{background:rgba(255,255,255,0.18);}
  .flow-arrow svg{width:20px;height:20px;}
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#8B1A2F">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#8B1A2F"/><text x="50" y="64" font-size="46" font-family="Georgia,serif" font-style="italic" font-weight="900" fill="#fff" text-anchor="middle">V</text></svg>
</template>

<script type="text/babel" src="pwa-components.jsx?v=39"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="flow-welcome.jsx?v=2"></script>
<script type="text/babel" src="flow-auth.jsx?v=2"></script>
<script type="text/babel" src="flow-onboard.jsx?v=4"></script>
<script type="text/babel" src="flow-paywall.jsx?v=3"></script>

<script type="text/babel">
const STEPS=[
  {key:'welcome', label:'Welcome'},
  {key:'scan',    label:'First scan'},
  {key:'auth',    label:'Sign up'},
  {key:'onboard', label:'Setup'},
  {key:'paywall', label:'Pro'},
  {key:'done',    label:'Done'},
];

const FLOW_DEFAULTS = /*EDITMODE-BEGIN*/{
  "signIn": "Social-first",
  "paywall": "Plan cards"
}/*EDITMODE-END*/;

function useScale(){
  const [scale,setScale]=React.useState(1);
  React.useEffect(()=>{
    function fit(){
      const stage=document.querySelector('.flow-stage');
      if(!stage) return;
      const availH=stage.clientHeight-24, availW=stage.clientWidth-24;
      setScale(Math.min(1, availH/844, availW/390));
    }
    fit();
    window.addEventListener('resize',fit);
    return ()=>window.removeEventListener('resize',fit);
  },[]);
  return scale;
}

function FlowApp(){
  const [t,setTweak]=useTweaks(FLOW_DEFAULTS);
  const [step,setStep]=React.useState(()=>localStorage.getItem('vinterest_flow_step')||'welcome');
  const scale=useScale();

  React.useEffect(()=>{ localStorage.setItem('vinterest_flow_step',step); },[step]);

  const idx=Math.max(0,STEPS.findIndex(s=>s.key===step));
  const go=k=>setStep(k);
  const next=()=>go(STEPS[Math.min(STEPS.length-1,idx+1)].key);
  const prev=()=>go(STEPS[Math.max(0,idx-1)].key);

  const authVariant=t.signIn==='Email-first'?'B':'A';
  const paywallVariant=t.paywall==='Comparison'?'B':'A';

  function renderStep(){
    switch(step){
      case 'welcome': return <WelcomeScreen next={next}/>;
      case 'scan':    return <DemoScanScreen next={next}/>;
      case 'auth':    return <AuthScreen variant={authVariant} next={next}/>;
      case 'onboard': return <OnboardQuestions next={next}/>;
      case 'paywall': return <PaywallScreen variant={paywallVariant} next={next}/>;
      case 'done':    return <DoneScreen restart={()=>go('welcome')}/>;
      default: return null;
    }
  }

  return(
    <React.Fragment>
      <div className="flow-top">
        {STEPS.map((s,i)=>(
          <div key={s.key} className={'flow-step'+(s.key===step?' on':'')} onClick={()=>go(s.key)}>
            <span className="num">{i+1}</span>{s.label}
          </div>
        ))}
      </div>

      <div className="flow-stage">
        <div className="device" style={{transform:`scale(${scale})`,transformOrigin:'center center'}}>
          <div className="device-screen" key={step}>
            {renderStep()}
          </div>
        </div>
        <div className="flow-arrows">
          <div className="flow-arrow" onClick={prev}>
            <svg viewBox="0 0 20 20"><polyline points="12,4 6,10 12,16" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <div className="flow-arrow" onClick={next}>
            <svg viewBox="0 0 20 20"><polyline points="8,4 14,10 8,16" stroke="#fff" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="Variations"/>
        <TweakRadio label="Sign-up layout" value={t.signIn} options={['Social-first','Email-first']} onChange={v=>setTweak('signIn',v)}/>
        <TweakRadio label="Paywall layout" value={t.paywall} options={['Plan cards','Comparison']} onChange={v=>setTweak('paywall',v)}/>
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FlowApp/>);
</script>
</body>
</html>
