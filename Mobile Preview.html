<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Vinterest — Mobile Preview</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;}
  .frame{
    width:390px;
    height:844px;
    border-radius:44px;
    overflow:hidden;
    box-shadow:0 0 0 10px #2a2a2a,0 0 0 11px #444,0 32px 80px rgba(0,0,0,0.7);
    position:relative;
    flex-shrink:0;
  }
  iframe{
    width:390px;
    height:844px;
    border:none;
    display:block;
  }
  .label{
    position:absolute;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,0.3);
    font-size:12px;
    letter-spacing:.04em;
    white-space:nowrap;
  }
</style>
</head>
<body>
  <div class="frame">
    <iframe src="index.html" title="Vinterest Mobile"></iframe>
  </div>
  <div class="label">Mobile preview — 390 × 844</div>
</body>
</html>
