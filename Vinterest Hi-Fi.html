<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vinterest — Hi-Fi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#1A1A1A;overflow:hidden}
:root{
  --cr:#8B1A2F;
  --cr-light:#B02440;
  --cr-dim:#8B1A2F22;
  --cr-soft:#8B1A2F12;
  --ink:#0F0F0F;
  --ink2:#3A3A3A;
  --mid:#888;
  --line:#E8E8E8;
  --bg:#FAFAFA;
  --white:#FFFFFF;
  --P:'Poppins',sans-serif;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

/* ─── TOKENS ─── */
const C = {
  cr:'#8B1A2F', crL:'#B02440', crDim:'rgba(139,26,47,0.13)', crSoft:'rgba(139,26,47,0.07)',
  ink:'#0F0F0F', ink2:'#3A3A3A', mid:'#8A8A8A', line:'#E8E8E8',
  bg:'#FAFAFA', white:'#FFFFFF', offWhite:'#F5F3F0',
  green:'#1E7B4B', greenBg:'#EAF7F0', amber:'#B06C00', amberBg:'#FFF4E0',
  P:"'Poppins',sans-serif",
};

/* ─── ICONS ─── */
function Icon({n,sz=20,col=C.ink,style:s}){
  const d={
    scan:<><rect x="3" y="3" width="6" height="6" rx="1" stroke={col} strokeWidth="1.6" fill="none"/><rect x="11" y="3" width="6" height="6" rx="1" stroke={col} strokeWidth="1.6" fill="none"/><rect x="3" y="11" width="6" height="6" rx="1" stroke={col} strokeWidth="1.6" fill="none"/><circle cx="14" cy="14" r="2.5" stroke={col} strokeWidth="1.6" fill="none"/><line x1="16.5" y1="16.5" x2="18.5" y2="18.5" stroke={col} strokeWidth="1.6" strokeLinecap="round"/></>,
    fork:<><path d="M7 2v5c0 1.5.8 2.5 2 3v8" stroke={col} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/><path d="M5 2v3" stroke={col} strokeWidth="1.6" fill="none" strokeLinecap="round"/><path d="M9 2v3" stroke={col} strokeWidth="1.6" fill="none" strokeLinecap="round"/><path d="M14 2v4l2-1v-3" stroke={col} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/><path d="M14 6c0 2.5 2 3 2 5v7" stroke={col} strokeWidth="1.6" fill="none" strokeLinecap="round"/></>,
    cart:<><path d="M2 3h2.5l2.2 10h8.6l1.8-7H6.5" stroke={col} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/><circle cx="9" cy="17" r="1.2" fill={col}/><circle cx="14.5" cy="17" r="1.2" fill={col}/></>,
    home:<><path d="M3 9.5L10 3l7 6.5" stroke={col} strokeWidth="1.6" fill="none" strokeLinecap="round"/><path d="M5 8.5V17h4v-4.5h2V17h4V8.5" stroke={col} strokeWidth="1.6" fill="none" strokeLinecap="round"/></>,
    compass:<><circle cx="10" cy="10" r="7" stroke={col} strokeWidth="1.6" fill="none"/><polygon points="10,5.5 12,9.5 10,10.5 8,9.5" fill={col}/><polygon points="10,14.5 8,10.5 10,10.5 12,10.5" fill={col} opacity=".35"/></>,
    book:<><path d="M4 4.5C4 4.5 7 3.5 10 5C13 3.5 16 4.5 16 4.5V15C16 15 13 14 10 15.5C7 14 4 15 4 15V4.5Z" stroke={col} strokeWidth="1.6" fill="none" strokeLinejoin="round"/><line x1="10" y1="5" x2="10" y2="15.5" stroke={col} strokeWidth="1.2"/></>,
    user:<><circle cx="10" cy="7.5" r="3.2" stroke={col} strokeWidth="1.6" fill="none"/><path d="M3.5 18C3.5 14 6.5 12 10 12s6.5 2 6.5 6" stroke={col} strokeWidth="1.6" fill="none" strokeLinecap="round"/></>,
    back:<polyline points="12,4 5,10 12,16" stroke={col} strokeWidth="1.7" fill="none" strokeLinecap="round" strokeLinejoin="round"/>,
    chevron:<polyline points="7,4 13,10 7,16" stroke={col} strokeWidth="1.7" fill="none" strokeLinecap="round" strokeLinejoin="round"/>,
    heart:<path d="M10 16.5C10 16.5 3 12 3 7.5C3 5 5 3.2 7.2 3.2c1.5 0 2.5 1 2.8 1.8.3-.8 1.3-1.8 2.8-1.8C15 3.2 17 5 17 7.5c0 4.5-7 9-7 9z" stroke={col} strokeWidth="1.6" fill="none"/>,
    share:<><circle cx="14.5" cy="4.5" r="2" stroke={col} strokeWidth="1.5" fill="none"/><circle cx="5.5" cy="10" r="2" stroke={col} strokeWidth="1.5" fill="none"/><circle cx="14.5" cy="15.5" r="2" stroke={col} strokeWidth="1.5" fill="none"/><line x1="7.4" y1="9" x2="12.6" y2="5.5" stroke={col} strokeWidth="1.5"/><line x1="7.4" y1="11" x2="12.6" y2="14.5" stroke={col} strokeWidth="1.5"/></>,
    camera:<><rect x="2.5" y="6" width="15" height="11" rx="2" stroke={col} strokeWidth="1.6" fill="none"/><circle cx="10" cy="11.5" r="3" stroke={col} strokeWidth="1.6" fill="none"/><path d="M7.5 6L8.5 4h3l1 2" stroke={col} strokeWidth="1.4" fill="none" strokeLinejoin="round"/></>,
    star:<polygon points="10,2 12.4,7.6 18.5,8.2 14,12.3 15.4,18.3 10,15.1 4.6,18.3 6,12.3 1.5,8.2 7.6,7.6" fill={col}/>,
    check:<polyline points="3.5,10 7.5,14.5 16.5,5" stroke={col} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>,
    flash:<polygon points="11.5,2 5,11.5 10.5,11.5 8.5,18 15,8.5 9.5,8.5" stroke={col} strokeWidth="1.3" fill={col} opacity=".15"/>,
    more:<><circle cx="5" cy="10" r="1.2" fill={col}/><circle cx="10" cy="10" r="1.2" fill={col}/><circle cx="15" cy="10" r="1.2" fill={col}/></>,
    wine:<><path d="M7.5 2.5h5v5c0 3.5-1.8 5-2.5 5S7.5 11 7.5 8V2.5z" stroke={col} strokeWidth="1.5" fill="none" strokeLinejoin="round"/><line x1="10" y1="12.5" x2="10" y2="17" stroke={col} strokeWidth="1.5"/><line x1="7" y1="17" x2="13" y2="17" stroke={col} strokeWidth="1.5" strokeLinecap="round"/></>,
    flame:<path d="M10 2C10 2 14.5 6.5 14.5 10.5C14.5 13.5 12.5 16 10 16C7.5 16 5.5 13.5 5.5 10.5C5.5 6.5 10 2 10 2Z" stroke={col} strokeWidth="1.5" fill="none"/>,
    trophy:<><path d="M5.5 3h9v5c0 3-2 5-4.5 5S5.5 11 5.5 8V3z" stroke={col} strokeWidth="1.5" fill="none"/><path d="M5.5 5H3c0 3 1.5 4.5 2.5 4.5" stroke={col} strokeWidth="1.3" fill="none"/><path d="M14.5 5H17c0 3-1.5 4.5-2.5 4.5" stroke={col} strokeWidth="1.3" fill="none"/><line x1="10" y1="13" x2="10" y2="16.5" stroke={col} strokeWidth="1.5"/><line x1="7" y1="16.5" x2="13" y2="16.5" stroke={col} strokeWidth="1.5" strokeLinecap="round"/></>,
    lock:<><rect x="5.5" y="9.5" width="9" height="7.5" rx="1.5" stroke={col} strokeWidth="1.5" fill="none"/><path d="M7.5 9.5V7C7.5 5 8.5 3.5 10 3.5S12.5 5 12.5 7v2.5" stroke={col} strokeWidth="1.5" fill="none"/><circle cx="10" cy="13" r="1" fill={col}/></>,
    message:<><path d="M3 5h14a1 1 0 011 1v8a1 1 0 01-1 1H5l-3 2V6a1 1 0 011-1z" stroke={col} strokeWidth="1.5" fill="none" strokeLinejoin="round"/></>,
    globe:<><circle cx="10" cy="10" r="7.5" stroke={col} strokeWidth="1.5" fill="none"/><ellipse cx="10" cy="10" rx="3.5" ry="7.5" stroke={col} strokeWidth="1.2" fill="none"/><line x1="2.5" y1="10" x2="17.5" y2="10" stroke={col} strokeWidth="1.2"/></>,
  };
  return <svg viewBox="0 0 20 20" width={sz} height={sz} style={{display:'block',flexShrink:0,...s}}>{d[n]||<circle cx="10" cy="10" r="7" stroke={col} strokeWidth="1.5" fill="none"/>}</svg>;
}

/* ─── PHONE SHELL ─── */
function Phone({children,dark}){
  return(
    <div style={{width:'100%',height:'100%',borderRadius:44,overflow:'hidden',background:dark?C.ink:C.white,display:'flex',flexDirection:'column',boxShadow:'0 32px 80px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.08)'}}>
      <StatusBar dark={dark}/>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',background:dark?C.ink:C.bg}}>
        {children}
      </div>
      <BottomNav dark={dark}/>
    </div>
  );
}
function StatusBar({dark}){
  const fg=dark?'#fff':C.ink;
  return(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 24px 4px',background:dark?C.ink:C.white,flexShrink:0,position:'relative'}}>
      <span style={{fontSize:12,fontWeight:600,color:fg,fontFamily:C.P}}>9:41</span>
      <div style={{width:88,height:24,borderRadius:12,background:dark?'rgba(255,255,255,0.12)':C.ink,position:'absolute',left:'50%',transform:'translateX(-50%)'}}/>
      <div style={{display:'flex',gap:5,alignItems:'center'}}>
        <svg width="16" height="11" viewBox="0 0 16 11"><rect x="0" y="4" width="2.5" height="7" rx="0.6" fill={fg}/><rect x="4" y="2.5" width="2.5" height="8.5" rx="0.6" fill={fg}/><rect x="8" y="1" width="2.5" height="10" rx="0.6" fill={fg}/><rect x="12" y="0" width="2.5" height="11" rx="0.6" fill={fg} opacity=".25"/></svg>
        <svg width="18" height="11" viewBox="0 0 18 11"><rect x="0.7" y="0.7" width="14" height="9.6" rx="2" stroke={fg} strokeWidth="1.3" fill="none"/><rect x="15.3" y="3.5" width="2" height="4" rx="1" fill={fg}/><rect x="2" y="2" width="9" height="7" rx="1" fill={fg}/></svg>
      </div>
    </div>
  );
}
function BottomNav({active=0,dark}){
  const items=[{l:'Home',i:'home'},{l:'Discover',i:'compass'},{l:'',i:'scan',fab:true},{l:'Learn',i:'book'},{l:'Profile',i:'user'}];
  const bg=dark?C.ink:C.white;
  const border=dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)';
  return(
    <div style={{display:'flex',alignItems:'flex-end',padding:'8px 8px 20px',background:bg,borderTop:`1px solid ${border}`,flexShrink:0}}>
      {items.map((it,i)=>(
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
          {it.fab?(
            <div style={{width:50,height:50,borderRadius:25,background:C.cr,display:'flex',alignItems:'center',justifyContent:'center',marginTop:-20,boxShadow:`0 4px 20px ${C.cr}60`}}>
              <Icon n="scan" sz={22} col="#fff"/>
            </div>
          ):(
            <Icon n={it.i} sz={20} col={i===active?C.cr:(dark?'rgba(255,255,255,0.4)':C.mid)}/>
          )}
          {it.l&&<span style={{fontSize:9,fontWeight:500,color:i===active?C.cr:(dark?'rgba(255,255,255,0.4)':C.mid),fontFamily:C.P,letterSpacing:'0.02em'}}>{it.l}</span>}
        </div>
      ))}
    </div>
  );
}

/* ─── SHARED PRIMITIVES ─── */
function Pill({children,active,sm,style:s}){
  return <span style={{display:'inline-flex',alignItems:'center',padding:sm?'3px 9px':'5px 12px',borderRadius:20,background:active?C.cr:'transparent',color:active?'#fff':C.mid,border:`1px solid ${active?C.cr:C.line}`,fontSize:sm?9:11,fontWeight:500,fontFamily:C.P,...s}}>{children}</span>;
}
function Prog({val=0.5,col,h=4,style:s}){
  return <div style={{height:h,borderRadius:h,background:'rgba(0,0,0,0.07)',overflow:'hidden',...s}}><div style={{height:'100%',width:`${val*100}%`,borderRadius:h,background:col||C.cr,transition:'width .3s'}}/></div>;
}
function Stars({n=4,max=5,sz=13}){
  return <div style={{display:'flex',gap:2}}>{Array.from({length:max},(_,i)=><svg key={i} width={sz} height={sz} viewBox="0 0 20 20"><polygon points="10,2 12.4,7.6 18.5,8.2 14,12.3 15.4,18.3 10,15.1 4.6,18.3 6,12.3 1.5,8.2 7.6,7.6" fill={i<n?'#B06C00':'#E0E0E0'}/></svg>)}</div>;
}
function Card({children,style:s,onClick}){
  return <div onClick={onClick} style={{background:C.white,borderRadius:16,padding:14,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',...s}}>{children}</div>;
}
function MatchBadge({score}){
  const col=score>=85?C.green:score>=70?C.amber:C.mid;
  const bg=score>=85?C.greenBg:score>=70?C.amberBg:'#F5F5F5';
  return <div style={{display:'inline-flex',alignItems:'center',gap:3,padding:'4px 9px',borderRadius:8,background:bg}}><span style={{fontSize:12,fontWeight:700,color:col,fontFamily:C.P}}>{score}%</span><span style={{fontSize:9,color:col,fontFamily:C.P,opacity:.7}}>match</span></div>;
}

/* ══════════════════════════════════════════════════════
   SCREEN 1 — HOME
   ══════════════════════════════════════════════════════ */
function ScreenHome(){
  const [profileTab, setProfileTab] = React.useState(0);
  const profileScripts = [
    {col:'#8B1A2F', label:'Reds',    script:'"I enjoy full-bodied reds with earthy notes and structured tannins — Bordeaux blends and Barolo are favorites. Dry, $40–80."'},
    {col:'#B8963E', label:'Whites',  script:'"I love crisp, dry whites with citrus and mineral notes — Sancerre and white Burgundy are my go-tos. $25–60."'},
    {col:'#C47A8A', label:'Rosé',    script:'"I prefer bone-dry Provençal rosé with delicate red fruit — light, elegant, and refreshing. $20–40."'},
    {col:'#5E8FA8', label:'Sparkling',script:'"I enjoy Champagne and Crémant — dry (Brut), with brioche and citrus notes. Not too sweet. $40–90."'},
  ];
  return(
    <Phone>
      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}}>
        {/* Header */}
        <div style={{padding:'12px 20px 0',display:'flex',justifyContent:'space-between',alignItems:'center',background:C.white}}>
          <div>
            <div style={{fontSize:11,color:C.mid,fontFamily:C.P,fontWeight:400}}>Good evening</div>
            <div style={{fontSize:20,fontWeight:700,color:C.ink,fontFamily:C.P,letterSpacing:'-0.5px',lineHeight:1.15}}>Vinterest</div>
          </div>
          <div style={{width:38,height:38,borderRadius:19,background:C.offWhite,display:'flex',alignItems:'center',justifyContent:'center',border:`1px solid ${C.line}`}}>
            <Icon n="user" sz={18} col={C.ink2}/>
          </div>
        </div>

        {/* Quick Actions */}
        <div style={{padding:'16px 20px 0'}}>
          <div style={{fontSize:11,fontWeight:600,color:C.mid,letterSpacing:'0.08em',textTransform:'uppercase',fontFamily:C.P,marginBottom:10}}>Quick Actions</div>
          {/* Primary — Scan */}
          <div style={{background:C.ink,borderRadius:20,padding:'20px 20px',display:'flex',alignItems:'center',gap:14,marginBottom:10,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',right:-20,top:-20,width:120,height:120,borderRadius:60,background:`rgba(139,26,47,0.25)`}}/>
            <div style={{position:'absolute',right:20,bottom:-30,width:80,height:80,borderRadius:40,background:`rgba(139,26,47,0.12)`}}/>
            <div style={{width:52,height:52,borderRadius:14,background:C.cr,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:`0 4px 16px ${C.cr}50`}}>
              <Icon n="camera" sz={26} col="#fff"/>
            </div>
            <div style={{flex:1,zIndex:1}}>
              <div style={{fontSize:16,fontWeight:700,color:'#fff',fontFamily:C.P}}>Scan a Bottle</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,0.5)',fontFamily:C.P,marginTop:2}}>Point at any label to identify</div>
            </div>
            <Icon n="chevron" sz={16} col="rgba(255,255,255,0.4)"/>
          </div>

          {/* Secondary row */}
          <div style={{display:'flex',gap:10}}>
            <div style={{flex:1,background:C.white,borderRadius:16,padding:'14px 14px',display:'flex',flexDirection:'column',gap:10,border:`1px solid ${C.line}`}}>
              <div style={{width:38,height:38,borderRadius:10,background:C.crSoft,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon n="fork" sz={20} col={C.cr}/>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.ink,fontFamily:C.P}}>Restaurant</div>
                <div style={{fontSize:10,color:C.mid,fontFamily:C.P}}>Scan menus, get scripts</div>
              </div>
            </div>
            <div style={{flex:1,background:C.white,borderRadius:16,padding:'14px 14px',display:'flex',flexDirection:'column',gap:10,border:`1px solid ${C.line}`}}>
              <div style={{width:38,height:38,borderRadius:10,background:C.crSoft,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon n="cart" sz={20} col={C.cr}/>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.ink,fontFamily:C.P}}>Shopping</div>
                <div style={{fontSize:10,color:C.mid,fontFamily:C.P}}>Match wines in store</div>
              </div>
            </div>
          </div>
        </div>

        {/* Taste Profile snapshot */}
        <div style={{padding:'20px 20px 0'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:600,color:C.mid,letterSpacing:'0.08em',textTransform:'uppercase',fontFamily:C.P}}>Your Taste Profile</div>
            <span style={{fontSize:11,color:C.cr,fontWeight:600,fontFamily:C.P}}>Full Profile →</span>
          </div>
          <Card style={{padding:0,overflow:'hidden'}}>
            {/* Wine type tabs */}
            <div style={{display:'flex',borderBottom:`1px solid ${C.line}`}}>
              {profileScripts.map((t,i)=>(
                <div key={i} onClick={()=>setProfileTab(i)} style={{flex:1,textAlign:'center',padding:'10px 4px',cursor:'pointer',borderBottom:i===profileTab?`2px solid ${t.col}`:'2px solid transparent',marginBottom:-1}}>
                  <div style={{width:8,height:8,borderRadius:4,background:t.col,margin:'0 auto 3px'}}/>
                  <span style={{fontSize:9.5,fontWeight:i===profileTab?700:400,color:i===profileTab?t.col:C.mid,fontFamily:C.P}}>{t.label}</span>
                </div>
              ))}
            </div>
            {/* Active script */}
            <div style={{padding:'12px 14px'}}>
              <div style={{fontSize:11,color:C.ink2,fontFamily:C.P,fontStyle:'italic',lineHeight:1.55,marginBottom:10}}>{profileScripts[profileTab].script}</div>
              <div style={{display:'flex',gap:8}}>
                <div style={{flex:1,background:profileScripts[profileTab].col,borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                  <span style={{fontSize:10,fontWeight:600,color:'#fff',fontFamily:C.P}}>Copy Script</span>
                </div>
                <div style={{flex:1,background:C.offWhite,borderRadius:8,padding:'8px 10px',textAlign:'center',border:`1px solid ${C.line}`}}>
                  <span style={{fontSize:10,fontWeight:500,color:C.ink2,fontFamily:C.P}}>Edit Preferences</span>
                </div>
              </div>
            </div>
          </Card>
        </div>

        {/* Guide — Recently Scanned */}
        <div style={{padding:'20px 20px 16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:600,color:C.mid,letterSpacing:'0.08em',textTransform:'uppercase',fontFamily:C.P}}>Continue Learning</div>
            <span style={{fontSize:11,color:C.cr,fontWeight:600,fontFamily:C.P}}>See All →</span>
          </div>
          <div style={{display:'flex',gap:10}}>
            {[{l:'Red Grapes',p:.8,col:'#8B1A2F'},{l:'French Regions',p:.3,col:'#3D6B3D'},{l:'Tasting Technique',p:.1,col:'#5E8FA8'}].map((t,i)=>(
              <div key={i} style={{flex:1,background:C.white,borderRadius:14,padding:'12px 10px',border:`1px solid ${C.line}`}}>
                <Prog val={t.p} col={t.col} h={3} style={{marginBottom:8}}/>
                <div style={{fontSize:10,fontWeight:600,color:C.ink,fontFamily:C.P,lineHeight:1.3}}>{t.l}</div>
                <div style={{fontSize:9,color:C.mid,fontFamily:C.P,marginTop:2}}>{Math.round(t.p*10)}/10</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </Phone>
  );
}

/* ══════════════════════════════════════════════════════
   SCREEN 2 — SCAN CAMERA
   ══════════════════════════════════════════════════════ */
function ScreenScanCamera(){
  return(
    <Phone dark>
      <div style={{flex:1,display:'flex',flexDirection:'column',background:'#0A0A0A',position:'relative',overflow:'hidden'}}>
        {/* Fake camera grain */}

        {/* Header */}
        <div style={{background:C.white,padding:'12px 20px 0',flexShrink:0,borderBottom:`1px solid ${C.line}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{width:34,height:34,borderRadius:17,background:C.offWhite,border:`1px solid ${C.line}`,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon n="back" sz={16} col={C.ink}/></div>
            <span style={{fontSize:13,fontWeight:600,color:C.ink,fontFamily:C.P}}>Château Margaux 2018</span>
            <Icon n="share" sz={18} col={C.mid}/>
          </div>
          {/* Score ring */}
          <div style={{textAlign:'center',padding:'4px 0 10px'}}>
            <div style={{width:68,height:68,borderRadius:34,border:`3px solid ${C.green}`,background:C.greenBg,display:'inline-flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
              <span style={{fontSize:22,fontWeight:800,color:C.green,fontFamily:C.P,lineHeight:1}}>94</span>
              <span style={{fontSize:8,color:C.green,fontFamily:C.P,opacity:.7}}>% match</span>
            </div>
            <div style={{fontSize:10,color:C.mid,fontFamily:C.P,marginTop:5}}>Bordeaux · Cabernet Blend · Red · Dry</div>
          </div>
          {/* Tabs */}
          <div style={{display:'flex',gap:0,borderBottom:`1px solid ${C.line}`}}>
            {['Overview','Story','Data'].map((t,i)=>(
              <div key={i} style={{flex:1,textAlign:'center',paddingBottom:10,fontSize:11,fontWeight:i===2?600:400,color:i===2?C.cr:C.mid,fontFamily:C.P,borderBottom:i===2?`2px solid ${C.cr}`:'none',marginBottom:-1}}>{t}</div>
            ))}
          </div>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'14px 20px',display:'flex',flexDirection:'column',gap:12}}>
          {/* Taste data grid */}
          <Card style={{padding:12}}>
            <div style={{fontSize:11,fontWeight:600,color:C.ink,fontFamily:C.P,marginBottom:8}}>Taste Profile</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px 16px'}}>
              {[{l:'Body',v:.85},{l:'Tannins',v:.8},{l:'Acidity',v:.6},{l:'Sweetness',v:.1},{l:'Alcohol',v:.7},{l:'Fruit Intensity',v:.78}].map((t,i)=>(
                <div key={i}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:9.5,color:C.mid,fontFamily:C.P}}>{t.l}</span>
                    <span style={{fontSize:9.5,fontWeight:600,color:C.ink,fontFamily:C.P}}>{t.v>=.7?'High':t.v>=.4?'Med':'Low'}</span>
                  </div>
                  <Prog val={t.v} col={C.cr} h={4}/>
                </div>
              ))}
            </div>
          </Card>

          {/* Vintage info */}
          <Card style={{padding:12}}>
            <div style={{fontSize:11,fontWeight:600,color:C.ink,fontFamily:C.P,marginBottom:8}}>2018 Vintage</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[{l:'Vintage Rating',v:'Exceptional'},{l:'Drink Window',v:'Now – 2050'},{l:'Peak',v:'2030–2040'},{l:'ABV',v:'13.5%'}].map((d,i)=>(
                <div key={i} style={{background:C.offWhite,borderRadius:8,padding:'8px 10px'}}>
                  <div style={{fontSize:9,color:C.mid,fontFamily:C.P,marginBottom:2}}>{d.l}</div>
                  <div style={{fontSize:12,fontWeight:600,color:C.ink,fontFamily:C.P}}>{d.v}</div>
                </div>
              ))}
            </div>
          </Card>

          {/* Tasting Notes */}
          <Card style={{padding:12}}>
            <div style={{fontSize:11,fontWeight:600,color:C.ink,fontFamily:C.P,marginBottom:7}}>Tasting Notes</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {['Black Cassis','Cedar','Violets','Tobacco','Graphite','Dark Plum'].map((n,i)=>(
                <span key={i} style={{padding:'4px 10px',borderRadius:20,background:i<3?C.crSoft:C.offWhite,color:i<3?C.cr:C.ink2,fontSize:9.5,fontFamily:C.P,fontWeight:500,border:`1px solid ${i<3?C.crDim:C.line}`}}>{n}</span>
              ))}
            </div>
          </Card>

          <div style={{display:'flex',gap:8,marginBottom:4}}>
            <div style={{flex:1,background:C.cr,borderRadius:12,padding:'12px',textAlign:'center',boxShadow:`0 4px 16px ${C.cr}40`}}>
              <span style={{fontSize:12,fontWeight:600,color:'#fff',fontFamily:C.P}}>Rate Wine</span>
            </div>
            <div style={{flex:1,background:C.white,borderRadius:12,padding:'12px',textAlign:'center',border:`1px solid ${C.line}`}}>
              <span style={{fontSize:12,fontWeight:500,color:C.ink,fontFamily:C.P}}>Add to List</span>
            </div>
          </div>
        </div>
      </div>
    </Phone>
  );
}

/* ══════════════════════════════════════════════════════
   APP
   ══════════════════════════════════════════════════════ */
const W=320,H=692;
function App(){
  return(
    <DesignCanvas>
      <DCSection id="home" title="Home Screen" subtitle="Quick actions prominent — Scan, Restaurant, Shopping — with Taste Profile and Learn guide below">
        <DCArtboard id="h1" label="Home" width={W} height={H}><ScreenHome/></DCArtboard>
      </DCSection>

      <DCSection id="scan" title="Scan Flow" subtitle="Camera → Wine Identified quick result">
        <DCArtboard id="s1" label="Camera Viewfinder" width={W} height={H}><ScreenScanCamera/></DCArtboard>
        <DCArtboard id="s2" label="Wine Identified" width={W} height={H}><ScreenWineIdentified/></DCArtboard>
      </DCSection>

      <DCSection id="detail" title="Wine Detail" subtitle="Overview (default) + Story + Data tabs — tap tabs to switch. Overview leads with plain-English taste education.">
        <DCArtboard id="d1" label="Overview — Educational (Default)" width={W} height={H}><ScreenWineDetailA/></DCArtboard>
        <DCArtboard id="d2" label="Story — Narrative" width={W} height={H}><ScreenWineDetailB/></DCArtboard>
        <DCArtboard id="d3" label="Data — Dashboard" width={W} height={H}><ScreenWineDetailC/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
