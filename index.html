<div id="vinterest-update-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#8B1A2F;padding:12px 16px;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,0.3);">
  <span style="flex:1;font-size:15px;font-weight:600;color:#fff;font-family:system-ui,sans-serif;">A new version of Vinterest is ready</span>
  <button id="vinterest-update-btn" style="background:#fff;color:#8B1A2F;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:system-ui,sans-serif;">Update</button>
  <button onclick="document.getElementById('vinterest-update-banner').style.display='none'" style="background:transparent;border:none;color:rgba(255,255,255,0.7);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;">×</button>
</div>
<script>
(function(){
  if(!('serviceWorker' in navigator)) return;

  function showBanner(reg){
    var banner = document.getElementById('vinterest-update-banner');
    if(!banner) return;
    banner.style.display = 'flex';
    // Update button: tell SW to skip waiting, then reload
    document.getElementById('vinterest-update-btn').onclick = function(){
      if(reg.waiting){
        reg.waiting.postMessage({type:'SKIP_WAITING'});
      }
      // Reload once the new SW has taken control
      navigator.serviceWorker.addEventListener('controllerchange', function(){
        window.location.reload();
      });
      // Fallback reload after 1.5s
      setTimeout(function(){ window.location.reload(); }, 1500);
    };
  }

  navigator.serviceWorker.register('/sw.js').then(function(reg){
    // Already waiting on load (e.g. user refreshed)
    if(reg.waiting){ showBanner(reg); return; }

    // New SW found while page is open
    reg.addEventListener('updatefound', function(){
      var newWorker = reg.installing;
      newWorker.addEventListener('statechange', function(){
        if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
          showBanner(reg);
        }
      });
    });

    // Poll for updates every 60s
    setInterval(function(){ reg.update(); }, 60000);
  }).catch(function(){/* sw not available in preview */});
})();
</script>

<script>

async function fetchRetailData(wineName, vintage, region) {
  region = region || localStorage.getItem('vinterest_region') || 'uk';
  const cacheKey = 'vinterest_retail_' + wineName.replace(/\s/g,'_') + '_' + (vintage||'nv') + '_' + region;
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    try {
      const parsed = JSON.parse(cached);
      if (Date.now() - parsed.fetchedAt < 86400000 * 7) return parsed;
    } catch(e) {}
  }

  const regionLabel = region === 'ontario' ? 'Ontario, Canada' : 'the UK';
  const prompt = `You are a wine pricing assistant. For the wine "${wineName}${vintage ? ' ' + vintage : ''}", return ONLY valid JSON with no markdown, no preamble:
{
  "price_range": "£18–£25",
  "price_mid": 22,
  "currency_symbol": "£",
  "retailers": [
    { "name": "Majestic Wine", "price": "£21.99", "note": "widely available" },
    { "name": "Berry Bros. & Rudd", "price": "£24.50", "note": "reliable stock" },
    { "name": "The Wine Society", "price": "£19.95", "note": "members only" }
  ],
  "availability": "widely available|specialist only|rare|not typically sold in this region",
  "buy_tip": "One short sentence of practical buying advice for this wine in ${regionLabel}."
}
Use realistic UK retail prices if region is uk, or CAD prices if ontario. Return 2–4 retailers typical for ${regionLabel}. If the wine is not typically sold in ${regionLabel}, return an empty retailers array and set availability accordingly. Return ONLY the JSON object.`;

  const text = await window.claude.complete({ messages: [{ role: 'user', content: prompt }] }).catch(function(){ return null; });

  let priceData = null;
  if (text) {
    try {
      let clean = text.replace(/```json|```/g, '').trim();
      const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
      if (s >= 0 && e > s) clean = clean.slice(s, e + 1);
      priceData = JSON.parse(clean);
    } catch(e) {}
  }

  let lcboData = null;
  if (region === 'ontario') {
    const lcbo = await fetch('https://vinterest.pages.dev/api/lcbo?name=' + encodeURIComponent(wineName))
      .then(function(r){ return r.json(); })
      .catch(function(){ return null; });
    lcboData = lcbo && lcbo.data && lcbo.data.products ? lcbo.data.products.edges : null;
  }

  const result = { priceData: priceData, lcboData: lcboData, fetchedAt: Date.now() };
  localStorage.setItem(cacheKey, JSON.stringify(result));
  return result;
}
</script>

    React.useEffect(()=>{
      const isMobile = t.layout === 'Phone';
      const current = localStorage.getItem('vinterest_force_mobile') === '1';
      if(isMobile !== current){
        if(isMobile) localStorage.setItem('vinterest_force_mobile','1');
        else localStorage.removeItem('vinterest_force_mobile');
        location.reload();
      }
    },[t.layout]);
    return(
      <TweaksPanel>
        <TweakSection label="Preview"/>
        <TweakRadio label="Layout" value={t.layout} options={['Phone','Tablet']}
          onChange={v=>setTweak('layout',v)}/>
      </TweaksPanel>
    );
  }

  const tweaksRoot = ReactDOM.createRoot(document.getElementById('tweaks-root'));
  tweaksRoot.render(<VinterestTweaks/>);
})();
</script>

<script>
  // iOS install prompt hint (shown once)
  window.addEventListener('load',()=>{
    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone=window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone;
    const shown=localStorage.getItem('vinterest_install_hint');
    if(isIOS&&!isStandalone&&!shown){
      localStorage.setItem('vinterest_install_hint','1');
      setTimeout(()=>{
        const b=document.createElement('div');
        b.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0F0F0F;color:#fff;padding:10px 16px;border-radius:12px;font-size:11px;font-family:Poppins,sans-serif;max-width:300px;text-align:center;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.4)';
        b.innerHTML='Tap <strong>Share</strong> then <strong>"Add to Home Screen"</strong> to install Vinterest';
        document.body.appendChild(b);
        setTimeout(()=>b.remove(),5000);
      },3000);
    }
  });
</script>
